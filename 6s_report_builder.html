<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>6S Report Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/piexifjs/1.0.6/piexif.js"></script>
<style>
  :root{--bg:#0f1115;--card:#171a21;--accent2:#2a7de1;--text:#f2f2f2;--muted:#9aa0ab;--green:#2ecc71;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;min-height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;}
  #app{max-width:520px;margin:0 auto;padding:18px;min-height:100vh;display:flex;flex-direction:column;}
  h1{font-size:20px;margin:0 0 4px;}
  p.sub{color:var(--muted);font-size:13px;margin:0 0 18px;}
  .card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:14px;}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px;}
  input[type=text]{width:100%;padding:12px;border-radius:10px;border:1px solid #2a2e38;background:#1d212b;color:var(--text);font-size:15px;margin-bottom:6px;outline:none;}
  .upload-box{
    border:2px dashed #2a2e38;border-radius:14px;padding:28px 16px;text-align:center;
    cursor:pointer;margin-bottom:14px;
  }
  .upload-box:active{background:#1a1d25;}
  .upload-box .icon{font-size:34px;margin-bottom:8px;}
  .upload-box .txt{font-size:14px;color:var(--muted);}
  input[type=file]{display:none;}
  .btn{padding:14px 18px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;width:100%;}
  .btn-primary{background:var(--accent2);color:#fff;}
  .btn-primary:disabled{background:#3a3f4a;color:#777;}
  .file-list{max-height:260px;overflow-y:auto;margin-bottom:10px;}
  .file-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #20242e;font-size:13px;}
  .file-row img{width:42px;height:42px;object-fit:cover;border-radius:6px;flex-shrink:0;}
  .file-row .meta{flex:1;overflow:hidden;}
  .file-row .floor{color:var(--accent2);font-weight:700;}
  .file-row .date{color:var(--muted);font-size:11px;}
  #progressWrap{display:none;margin-top:14px;}
  #progressBar{height:8px;border-radius:6px;background:#2a2e38;overflow:hidden;}
  #progressFill{height:100%;width:0%;background:var(--green);transition:width .15s;}
  #progressTxt{font-size:12px;color:var(--muted);margin-top:6px;text-align:center;}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.92);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;}
  #toast.show{opacity:1;}
  .count-badge{display:inline-block;background:#1d212b;border-radius:20px;padding:4px 12px;font-size:12px;color:var(--accent2);margin-bottom:10px;}
</style>
</head>
<body>
<div id="app">
  <h1>6S Report Builder <span style="font-size:11px;color:var(--green);">v3</span></h1>
  <p class="sub">Select your photos — they'll be embedded into an Excel report automatically, sorted by floor.</p>

  <div class="card">
    <label>Project Name (used in the file name)</label>
    <input type="text" id="projectName" placeholder="e.g. Tower 391 - Dubai Creek Beach">
  </div>

  <div class="upload-box" id="uploadBox">
    <div class="icon">📁</div>
    <div class="txt">Tap to select photos from your gallery</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple>

  <div id="fileListCard" class="card" style="display:none;">
    <div class="count-badge" id="countBadge">0 photos selected</div>
    <div class="file-list" id="fileList"></div>
  </div>

  <button class="btn btn-primary" id="btnGenerate" disabled>Generate Excel Report</button>

  <div id="progressWrap">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="progressTxt">Processing...</div>
  </div>
</div>
<div id="toast"></div>

<script>
let selectedFiles = [];

const uploadBox = document.getElementById('uploadBox');
const fileInput = document.getElementById('fileInput');
uploadBox.onclick = ()=> fileInput.click();

fileInput.addEventListener('change', (e)=>{
  selectedFiles = Array.from(e.target.files);
  renderFileList();
});

function parseFilename(name){
  // Expected base pattern: 6S_Project_Floor_timestamp  (timestamp = 13-digit epoch ms)
  // Robust to phones appending " (1)" or similar before the extension.
  const base = name.replace(/\.[^/.]+$/, '');

  // Find a 12-14 digit number anywhere in the name = the timestamp
  const tsMatch = base.match(/(\d{12,14})/);
  let dateStr = '-';
  let ts = null;
  if(tsMatch){
    ts = tsMatch[1];
    const num = parseInt(ts,10);
    const d = new Date(num);
    if(!isNaN(d.getTime()) && d.getFullYear() > 2000 && d.getFullYear() < 2100){
      dateStr = d.toLocaleString();
    } else {
      ts = null;
    }
  }

  if(!ts){
    return {floor:'-', project:'-', dateStr:'-'};
  }

  // Everything before the timestamp, strip trailing separators/junk like " (1)_" etc.
  const beforeTs = base.slice(0, base.indexOf(ts)).replace(/[\s()._-]+$/,'');
  const parts = beforeTs.split('_').filter(Boolean);

  if(parts.length >= 3 && parts[0] === '6S'){
    const floor = parts[parts.length-1];
    const project = parts.slice(1, parts.length-1).join('_');
    return {floor, project: project || '-', dateStr};
  }
  // Fallback: still got a valid date, just unknown floor/project
  return {floor:'-', project:'-', dateStr};
}

function floorSortKey(floor){
  const m = floor.match(/^([A-Za-z]+)(\d*)$/);
  if(!m) return [9, floor, 0];
  const prefix = m[1].toUpperCase();
  const num = m[2] ? parseInt(m[2],10) : 0;
  const order = {G:0,P:1,F:2,R:3};
  return [order[prefix] !== undefined ? order[prefix] : 9, prefix, num];
}

async function renderFileList(){
  const listEl = document.getElementById('fileList');
  const card = document.getElementById('fileListCard');
  listEl.innerHTML = '';
  if(selectedFiles.length === 0){
    card.style.display = 'none';
    document.getElementById('btnGenerate').disabled = true;
    return;
  }
  card.style.display = 'block';
  document.getElementById('countBadge').textContent = selectedFiles.length + ' photos selected (reading...)';
  document.getElementById('btnGenerate').disabled = true;

  const enriched = [];
  for(const f of selectedFiles){
    const meta = await getFileMetadata(f);
    enriched.push({file:f, ...meta});
  }
  enriched.sort((a,b)=>{
    const ka = floorSortKey(a.floor), kb = floorSortKey(b.floor);
    for(let i=0;i<3;i++){ if(ka[i] !== kb[i]) return ka[i] < kb[i] ? -1 : 1; }
    return 0;
  });
  selectedFiles = enriched.map(e=>e.file);

  document.getElementById('countBadge').textContent = selectedFiles.length + ' photos selected';
  document.getElementById('btnGenerate').disabled = false;

  enriched.forEach(item=>{
    const row = document.createElement('div');
    row.className = 'file-row';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(item.file);
    row.appendChild(img);
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `<div class="floor">${item.floor}</div><div class="date">${item.dateStr}</div>`;
    row.appendChild(meta);
    listEl.appendChild(row);
  });
}

function readAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function readAsArrayBuffer(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function getFileMetadata(file){
  // 1) Try EXIF ImageDescription first (survives Android filename randomization)
  try{
    const dataUrl = await readAsDataURL(file);
    const exifObj = piexif.load(dataUrl);
    const desc = exifObj['0th'] && exifObj['0th'][piexif.ImageIFD.ImageDescription];
    if(desc){
      const parsed = JSON.parse(desc);
      if(parsed && parsed.floor){
        const d = new Date(parsed.ts);
        const dateStr = !isNaN(d.getTime()) ? d.toLocaleString() : '-';
        return {floor: parsed.floor || '-', project: parsed.project || '-', dateStr, source:'exif'};
      }
    }
  }catch(e){ /* no usable EXIF, fall through to filename */ }

  // 2) Fallback: parse from filename (older photos / EXIF stripped)
  return {...parseFilename(file.name), source:'filename'};
}
function getImageDims(file){
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=> resolve({w:img.naturalWidth, h:img.naturalHeight});
    img.src = URL.createObjectURL(file);
  });
}

document.getElementById('btnGenerate').onclick = async ()=>{
  const project = document.getElementById('projectName').value.trim() || 'Project';
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressTxt = document.getElementById('progressTxt');
  progressWrap.style.display = 'block';
  document.getElementById('btnGenerate').disabled = true;

  const workbook = new ExcelJS.Workbook();
  const sheet = workbook.addWorksheet('6S Report');

  sheet.columns = [
    {header:'#', key:'idx', width:6},
    {header:'Floor', key:'floor', width:12},
    {header:'Date / Time', key:'date', width:20},
    {header:'Project', key:'project', width:26},
    {header:'Photo', key:'photo', width:28},
  ];

  const headerRow = sheet.getRow(1);
  headerRow.eachCell(cell=>{
    cell.font = {bold:true, color:{argb:'FFFFFFFF'}, size:11, name:'Arial'};
    cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FF1F4E78'}};
    cell.alignment = {horizontal:'center', vertical:'middle'};
  });

  const IMG_HEIGHT_PX = 130;

  for(let i=0;i<selectedFiles.length;i++){
    const file = selectedFiles[i];
    const meta = await getFileMetadata(file);
    const rowIdx = i + 2;
    const row = sheet.getRow(rowIdx);
    row.getCell(1).value = i+1;
    row.getCell(2).value = meta.floor;
    row.getCell(3).value = meta.dateStr;
    row.getCell(4).value = meta.project !== '-' ? meta.project : project;
    row.height = 100;
    row.eachCell(cell=>{
      cell.font = {name:'Arial', size:10};
      cell.alignment = {horizontal:'center', vertical:'middle'};
    });

    const buffer = await readAsArrayBuffer(file);
    const dims = await getImageDims(file);
    const imageId = workbook.addImage({buffer, extension:'jpeg'});
    const scale = IMG_HEIGHT_PX / dims.h;
    const dispW = dims.w * scale;
    sheet.addImage(imageId, {
      tl: {col:4, row: rowIdx - 1},
      ext: {width: dispW, height: IMG_HEIGHT_PX}
    });

    const pct = Math.round(((i+1)/selectedFiles.length)*100);
    progressFill.style.width = pct + '%';
    progressTxt.textContent = `Processing photo ${i+1} of ${selectedFiles.length}...`;
    await new Promise(r=>setTimeout(r,0)); // let UI update
  }

  progressTxt.textContent = 'Saving file...';
  const buf = await workbook.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `6S_Report_${project.replace(/\s+/g,'_')}.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  progressTxt.textContent = 'Done! Report downloaded.';
  document.getElementById('btnGenerate').disabled = false;
  toast('Excel report saved');
};

let toastTimer=null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
